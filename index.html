<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tanga Clicker</title>
    <!-- Adsgram SDK -->
    <script src="https://sad.adsgram.ai/js/adsgram.js"></script>
    <style>
        body { font-family: sans-serif; text-align: center; padding-top: 50px; background-color: #f4f4f9; }
        .balance { font-size: 24px; font-weight: bold; margin-bottom: 20px; }
        button { padding: 15px 30px; font-size: 18px; cursor: pointer; background-color: #0088cc; color: white; border: none; border-radius: 10px; }
    </style>
</head>
<body>

    <div class="balance">Tangalar: <span id="coins">0</span></div>
    
    <!-- Tugma -->
    <button id="adButton" onclick="showAd()">Reklama ko'rish (+10 tanga)</button>

    <script>
        let coins = 0;
        const coinDisplay = document.getElementById('coins');
        
        // Adsgram blokini o'rnatamiz
        const adUnit = new Adsgram.AdUnit({ blockId: '36320' });

        function showAd() {
            alert("Tugma bosildi! Reklama kutilmoqda..."); // Tugma ishlayotganini bilish uchun
            
            adUnit.show().then((result) => {
                coins += 10;
                coinDisplay.innerText = coins;
                alert("Muvaffaqiyatli: 10 tanga qo'shildi.");
            }).catch((result) => {
                alert("Xatolik yuz berdi: " + JSON.stringify(result));
            });
        }
    </script>

</body>
</html>
