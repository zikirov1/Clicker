<!DOCTYPE html>
<html lang="uz">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Adsgram Test</title>

<script src="https://telegram.org/js/telegram-web-app.js"></script>
<script src="https://sad.adsgram.ai/js/sad.min.js"></script>

<style>
body{
    background:#111;
    color:#fff;
    font-family:Arial;
    text-align:center;
    padding:30px;
}

button{
    width:250px;
    height:60px;
    font-size:20px;
    border:none;
    border-radius:12px;
    background:#229ED9;
    color:white;
}

#log{
    margin-top:20px;
    text-align:left;
    white-space:pre-wrap;
}
</style>

</head>

<body>

<h2>Adsgram Test</h2>

<button id="showAd">
Reklama ko'rish
</button>

<div id="log"></div>

<script>

const log=(t)=>{
    document.getElementById("log").innerHTML+=t+"<br>";
    console.log(t);
};

Telegram.WebApp.ready();
Telegram.WebApp.expand();

log("Telegram: OK");

window.addEventListener("load",()=>{

    if(!window.Adsgram){
        log("❌ Adsgram SDK yuklanmadi");
        return;
    }

    log("✅ Adsgram SDK yuklandi");

    const AdController=window.Adsgram.init({

        blockId:"36320",

        debug:true,

        debugConsole:true

    });

    document.getElementById("showAd").onclick=async()=>{

        try{

            const result=await AdController.show();

            log("✅ SUCCESS");

            log(JSON.stringify(result));

            alert("Reklama ko'rildi");

        }catch(e){

            log("❌ ERROR");

            log(JSON.stringify(e));

            alert(JSON.stringify(e));

        }

    };

});

</script>

</body>
</html>
