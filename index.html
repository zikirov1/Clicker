<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Adsgram Test</title>

    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://sad.adsgram.ai/js/adsgram.js"></script>
</head>
<body>

<h2>Adsgram Test</h2>

<button onclick="showAd()">Reklamani ko'rish</button>

<pre id="log"></pre>

<script>

const log = (text)=>{
    document.getElementById("log").innerHTML += text + "\n";
    console.log(text);
}

log("===== TEST BOSHLANDI =====");

if(window.Telegram){
    log("✅ Telegram WebApp topildi");
    Telegram.WebApp.ready();
    Telegram.WebApp.expand();

    log("Version: " + Telegram.WebApp.version);
    log("Platform: " + Telegram.WebApp.platform);
}else{
    log("❌ Telegram WebApp topilmadi");
}

if(window.Adsgram){
    log("✅ Adsgram yuklandi");
}else{
    log("❌ Adsgram yuklanmadi");
}

const adUnit = new Adsgram.AdUnit({
    blockId: "36320"
});

async function showAd(){

    log("-------------------------");
    log("Reklama so'ralmoqda...");

    try{

        const result = await adUnit.show();

        log("✅ Reklama muvaffaqiyatli chiqdi");
        log(JSON.stringify(result,null,2));

        alert("SUCCESS");

    }catch(e){

        log("❌ XATOLIK");
        log(JSON.stringify(e,null,2));

        alert(JSON.stringify(e));

    }

}

</script>

</body>
</html>
