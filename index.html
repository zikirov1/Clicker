<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Adsgram Test</title>

    <script src="https://telegram.org/js/telegram-web-app.js"></script>

    <!-- Adsgram -->
    <script src="https://sad.adsgram.ai/js/sad.min.js"></script>

    <style>
        body{
            font-family:Arial;
            background:#111;
            color:white;
            text-align:center;
            padding-top:40px;
        }

        button{
            padding:15px 30px;
            font-size:18px;
            border:none;
            border-radius:10px;
            background:#229ED9;
            color:white;
            cursor:pointer;
        }

        #log{
            margin-top:20px;
            text-align:left;
            background:#222;
            padding:15px;
            white-space:pre-wrap;
            border-radius:10px;
        }
    </style>
</head>

<body>

<h2>Adsgram Test</h2>

<button onclick="showAd()">
Reklamani ko'rish
</button>

<div id="log"></div>

<script>

const log=(text)=>{
    document.getElementById("log").innerHTML+=text+"<br>";
    console.log(text);
}

log("===== TEST =====");

if(window.Telegram){

    Telegram.WebApp.ready();
    Telegram.WebApp.expand();

    log("✅ Telegram WebApp topildi");
    log("Version: "+Telegram.WebApp.version);
    log("Platform: "+Telegram.WebApp.platform);

}else{

    log("❌ Telegram WebApp topilmadi");

}

if(window.Adsgram){

    log("✅ Adsgram yuklandi");

}else{

    log("❌ Adsgram yuklanmadi");

}

const ad=window.Adsgram.init({

    blockId:"36320",

    debug:true

});

async function showAd(){

    log("----------------------");
    log("Reklama chaqirilmoqda...");

    try{

        const result=await ad.show();

        log("✅ SUCCESS");
        log(JSON.stringify(result,null,2));

        alert("Reklama muvaffaqiyatli ko'rsatildi");

    }

    catch(e){

        log("❌ ERROR");
        log(JSON.stringify(e,null,2));

        alert(JSON.stringify(e));

    }

}

</script>

</body>
</html>
